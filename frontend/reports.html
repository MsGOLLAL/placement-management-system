<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Placement Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/components.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <nav id="sidebar" class="sidebar"></nav>
    <div id="mobileOverlay" class="mobile-overlay"></div>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
          <span class="page-title">Reports</span>
        </div>
        <div class="topbar-right"><span class="text-muted small"><strong id="topbarUserName"></strong></span></div>
      </header>
      <div class="content-area">
        <div class="page-header">
          <h1>Placement Reports</h1>
          <p>Generate and export placement analytics reports</p>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statTotalStudents">0</h3><p>Total Students</p></div></div></div>
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statSelected">0</h3><p>Selected</p></div></div></div>
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statPlacementPct">0%</h3><p>Placement %</p></div></div></div>
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statCompanies">0</h3><p>Companies</p></div></div></div>
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statJobs">0</h3><p>Jobs</p></div></div></div>
          <div class="col-md-4 col-lg-2"><div class="stat-card"><div class="stat-info"><h3 id="statApplications">0</h3><p>Applications</p></div></div></div>
        </div>

        <div class="glass-card p-4 mb-4 no-print">
          <div class="row g-3 align-items-end">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Report Type</label>
              <select class="form-select" id="reportType">
                <option value="">Select Report</option>
                <option value="eligible">Eligible Students (Stored Procedure)</option>
                <option value="selected">Selected Students</option>
                <option value="company">Company-wise Placements</option>
                <option value="branch">Branch-wise Placements</option>
              </select>
            </div>
            <div class="col-md-4 d-none" id="jobSelectGroup">
              <label class="form-label fw-semibold">Select Job</label>
              <select class="form-select" id="jobSelect"></select>
            </div>
            <div class="col-md-4">
              <button id="generateBtn" class="btn btn-primary w-100">
                <i class="fas fa-sync me-2"></i>Generate Report
              </button>
            </div>
          </div>
        </div>

        <div id="exportActions" class="d-none mb-3 no-print">
          <button id="exportPdfBtn" class="btn btn-outline-danger btn-sm me-2"><i class="fas fa-file-pdf me-1"></i>Export PDF</button>
          <button id="exportExcelBtn" class="btn btn-outline-success btn-sm me-2"><i class="fas fa-file-excel me-1"></i>Export Excel</button>
          <button id="printBtn" class="btn btn-outline-secondary btn-sm"><i class="fas fa-print me-1"></i>Print</button>
        </div>

        <div class="data-table-wrapper" id="reportOutput">
          <div class="table-toolbar">
            <div>
              <h5 id="reportTitle" class="mb-0">Report Output</h5>
              <small id="reportDate" class="text-muted"></small>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table data-table mb-0">
              <thead id="reportTableHead"></thead>
              <tbody id="reportTableBody">
                <tr><td class="text-center py-4 text-muted">Select a report type and click Generate</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/reports.js"></script>
</body>
</html>
