<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Placement Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/components.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-illustration">
      <div class="illustration-content">
        <i class="fas fa-graduation-cap fa-4x text-white mb-4"></i>
        <h2 class="text-white">Engineering Placement Portal</h2>
        <p class="text-white-50 fs-5">Connecting talent with opportunity</p>
        <div class="mt-4 d-flex gap-4 justify-content-center text-white-50">
          <div><i class="fas fa-building me-2"></i>500+ Companies</div>
          <div><i class="fas fa-users me-2"></i>2000+ Students</div>
        </div>
      </div>
    </div>
    <div class="login-form-section">
      <div class="login-card glass-card">
        <img src="assets/logo.svg" alt="College Logo" class="login-logo">
        <h3 class="text-center mb-1 mt-3">Placement Management System</h3>
        <p class="text-muted text-center mb-4">Sign in to your account</p>
        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label fw-semibold">Role</label>
            <select class="form-select" id="role" required>
              <option value="officer">Placement Officer</option>
              <option value="student">Student</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" class="form-control" id="username"
                     placeholder="Email / USN / Officer ID" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" class="form-control" id="password" required>
            </div>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe">Remember Me</label>
            </div>
            <a href="#" class="text-primary text-decoration-none small">Forgot Password?</a>
          </div>
          <button type="submit" class="btn btn-primary w-100 btn-lg">
            <i class="fas fa-sign-in-alt me-2"></i>Sign In
          </button>
        </form>
        <p class="text-center text-muted small mt-4 mb-0">
          Demo: Officer email + <code>admin123</code> | Student USN + <code>student123</code>
        </p>
      </div>
    </div>
  </div>
  <div id="toastContainer" class="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
