<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications | Placement Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/components.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <nav id="sidebar" class="sidebar"></nav>
    <div id="mobileOverlay" class="mobile-overlay"></div>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
          <span class="page-title">Applications</span>
        </div>
        <div class="topbar-right"><span class="text-muted small"><strong id="topbarUserName"></strong></span></div>
      </header>
      <div class="content-area">
        <div class="page-header">
          <h1>Application Tracking</h1>
          <p>Monitor and manage student job applications</p>
        </div>
        <div class="data-table-wrapper">
          <div class="table-toolbar" id="statusFilterGroup">
            <input type="text" id="searchInput" class="form-control form-control-sm" style="width:220px" placeholder="Search applications...">
            <select id="statusFilter" class="form-select form-select-sm" style="width:200px">
              <option value="">All Statuses</option>
              <option value="Applied">Applied</option>
              <option value="Shortlisted">Shortlisted</option>
              <option value="Interview Scheduled">Interview Scheduled</option>
              <option value="Selected">Selected</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
          <div class="table-responsive">
            <table class="table data-table mb-0">
              <thead>
                <tr>
                  <th>ID</th><th>Student</th><th>Company</th><th>Role</th>
                  <th>Package</th><th>Date</th><th>Status</th><th>Actions</th>
                </tr>
              </thead>
              <tbody id="applicationsTableBody"></tbody>
            </table>
          </div>
          <div class="table-footer">
            <span id="tableInfo" class="text-muted small"></span>
            <div id="pagination"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="statusModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Update Status</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <form id="statusForm">
          <div class="modal-body">
            <input type="hidden" id="statusAppId">
            <label class="form-label">Application Status</label>
            <select class="form-select" id="statusSelect" required>
              <option value="Applied">Applied</option>
              <option value="Shortlisted">Shortlisted</option>
              <option value="Interview Scheduled">Interview Scheduled</option>
              <option value="Selected">Selected</option>
              <option value="Rejected">Rejected</option>
            </select>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary btn-sm">Update</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Confirm</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p id="confirmMessage"></p></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger btn-sm" id="confirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/applications.js"></script>
</body>
</html>
