<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies | Placement Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/components.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <nav id="sidebar" class="sidebar"></nav>
    <div id="mobileOverlay" class="mobile-overlay"></div>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
          <span class="page-title">Companies</span>
        </div>
        <div class="topbar-right"><span class="text-muted small"><strong id="topbarUserName"></strong></span></div>
      </header>
      <div class="content-area">
        <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
          <div>
            <h1>Company Management</h1>
            <p>Manage recruiting companies and their details</p>
          </div>
          <button id="addCompanyBtn" class="btn btn-primary"><i class="fas fa-plus me-2"></i>Add Company</button>
        </div>
        <div class="data-table-wrapper mb-3">
          <div class="table-toolbar">
            <input type="text" id="searchInput" class="form-control form-control-sm" style="width:220px" placeholder="Search companies...">
            <select id="locationFilter" class="form-select form-select-sm" style="width:180px"><option value="">All Locations</option></select>
          </div>
        </div>
        <div id="companiesGrid" class="row g-3"></div>
      </div>
    </main>
  </div>

  <div class="modal fade" id="companyModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="companyModalTitle">Add Company</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="companyForm">
          <div class="modal-body">
            <input type="hidden" id="companyId">
            <div class="mb-3"><label class="form-label">Company Name</label><input type="text" class="form-control" id="companyName" required></div>
            <div class="mb-3"><label class="form-label">Location</label><input type="text" class="form-control" id="companyLocation" required></div>
            <div class="mb-3"><label class="form-label">Package (LPA)</label><input type="number" class="form-control" id="companyPackage" min="0" step="0.01" required></div>
            <div class="mb-3"><label class="form-label">Minimum CGPA</label><input type="number" class="form-control" id="companyMinCgpa" min="0" max="10" step="0.01" required></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Company</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Confirm</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p id="confirmMessage"></p></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger btn-sm" id="confirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/companies.js"></script>
</body>
</html>
