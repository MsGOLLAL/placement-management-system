<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students | Placement Management System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link href="css/components.css" rel="stylesheet">
</head>
<body>
  <div class="app-wrapper">
    <nav id="sidebar" class="sidebar"></nav>
    <div id="mobileOverlay" class="mobile-overlay"></div>
    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button id="sidebarToggle" class="sidebar-toggle"><i class="fas fa-bars"></i></button>
          <span class="page-title">Students</span>
        </div>
        <div class="topbar-right">
          <span class="text-muted small"><strong id="topbarUserName"></strong></span>
        </div>
      </header>
      <div class="content-area">
        <div class="page-header d-flex justify-content-between align-items-start flex-wrap gap-2">
          <div>
            <h1>Student Management</h1>
            <p>Manage student records, profiles, and eligibility</p>
          </div>
          <button id="addStudentBtn" class="btn btn-primary">
            <i class="fas fa-plus me-2"></i>Add Student
          </button>
        </div>

        <div class="data-table-wrapper">
          <div class="table-toolbar">
            <div class="d-flex gap-2 flex-wrap">
              <input type="text" id="searchInput" class="form-control form-control-sm" style="width:220px" placeholder="Search name, USN, email...">
              <select id="branchFilter" class="form-select form-select-sm" style="width:160px">
                <option value="">All Branches</option>
              </select>
            </div>
          </div>
          <div class="table-responsive">
            <table class="table data-table mb-0">
              <thead>
                <tr>
                  <th onclick="sortBy('STUDENT_ID')">ID</th>
                  <th onclick="sortBy('STUDENT_NAME')">Name</th>
                  <th onclick="sortBy('USN')">USN</th>
                  <th onclick="sortBy('BRANCH')">Branch</th>
                  <th onclick="sortBy('CGPA')">CGPA</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Profile / Actions</th>
                </tr>
              </thead>
              <tbody id="studentsTableBody"></tbody>
            </table>
          </div>
          <div class="table-footer">
            <span id="tableInfo" class="text-muted small"></span>
            <div id="pagination"></div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Student Modal -->
  <div class="modal fade" id="studentModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="studentModalTitle">Add Student</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="studentForm">
          <div class="modal-body">
            <input type="hidden" id="studentId">
            <div class="mb-3">
              <label class="form-label">Student Name</label>
              <input type="text" class="form-control" id="studentName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">USN</label>
              <input type="text" class="form-control" id="studentUsn" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Branch</label>
              <select class="form-select" id="studentBranch" required>
                <option value="CSE">CSE</option>
                <option value="ECE">ECE</option>
                <option value="ME">ME</option>
                <option value="CE">CE</option>
                <option value="EEE">EEE</option>
                <option value="ISE">ISE</option>
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label">CGPA</label>
              <input type="number" class="form-control" id="studentCgpa" min="0" max="10" step="0.01" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="studentEmail" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input type="tel" class="form-control" id="studentPhone" required>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Student</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Confirm</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p id="confirmMessage"></p></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger btn-sm" id="confirmBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toastContainer" class="toast-container"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/students.js"></script>
</body>
</html>
