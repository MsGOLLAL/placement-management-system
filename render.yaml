services:
  - type: web
    name: placement-management-system
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ORACLE_USE_THIN
        value: true
      - key: DEFAULT_OFFICER_PASSWORD
        value: admin123
      - key: DEFAULT_STUDENT_PASSWORD
        value: student123
